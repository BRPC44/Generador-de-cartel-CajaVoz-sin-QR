<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartel CajaVoz A5 Horizontal</title>
    <style>
        @page { size: A5 landscape; margin: 0; }

        *, *::before, *::after {
            box-sizing: border-box;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        html {
            background-color: #0a0f1e;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            min-height: 100dvh;
        }

        @media print {
            body { padding: 0; display: block; }
            .print-btn { display: none; }
        }

        /* Forzar impresión de fondos y colores */
        * {
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
            color-adjust: exact !important;
        }

        /*
          Presupuesto 145mm:
          padding top+bottom:   7 + 7  = 14mm
          header (fijo):               = 20mm
          fields padding t+b:   4 + 4  =  8mm
          label x2:             6 x2   = 12mm
          label margin-bottom:  3 x2   =  6mm
          box x2:               25 x2  = 50mm
          gap entre campos:            =  8mm
          footer (fijo):               =  7mm
          TOTAL:                       = 125mm ✓
        */

        .cartel {
            width: 210mm;
            height: 145mm;
            background: linear-gradient(135deg, #0d1b2a 0%, #0a1628 55%, #061020 100%);
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            padding: 7mm 12mm;
        }

        .cartel::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,200,83,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,200,83,0.04) 1px, transparent 1px);
            background-size: 8mm 8mm;
            pointer-events: none;
            z-index: 0;
        }

        .glow { position: absolute; border-radius: 50%; z-index: 0; pointer-events: none; }
        .glow-1 { top: -15mm; right: -15mm; width: 70mm; height: 70mm;
                  background: radial-gradient(circle, rgba(0,200,83,0.13) 0%, transparent 70%); }
        .glow-2 { bottom: -15mm; left: -15mm; width: 60mm; height: 60mm;
                  background: radial-gradient(circle, rgba(99,102,241,0.11) 0%, transparent 70%); }

        .corner { position: absolute; width: 9mm; height: 9mm; z-index: 2; }
        .c-tl { top: 5mm; left: 5mm;  border-top: 1.5px solid rgba(0,200,83,0.55);  border-left:  1.5px solid rgba(0,200,83,0.55); }
        .c-tr { top: 5mm; right: 5mm; border-top: 1.5px solid rgba(99,102,241,0.55); border-right: 1.5px solid rgba(99,102,241,0.55); }
        .c-bl { bottom: 5mm; left: 5mm;  border-bottom: 1.5px solid rgba(99,102,241,0.55); border-left:  1.5px solid rgba(99,102,241,0.55); }
        .c-br { bottom: 5mm; right: 5mm; border-bottom: 1.5px solid rgba(0,200,83,0.55);   border-right: 1.5px solid rgba(0,200,83,0.55); }

        /* ── FILA 1: header 20mm fijo ── */
        .row-brand {
            position: relative;
            z-index: 2;
            height: 22mm;
            flex-shrink: 0;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 5mm;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        /* logo llena el alto del header menos 2mm arriba/abajo */
        .logo-wrap img {
            height: 19mm;
            width: auto;
            display: block;
            mix-blend-mode: screen;
        }

        .brand-title {
            font-size: 24pt;
            font-weight: 800;
            color: #fff;
            margin: 0;
            line-height: 1;
            letter-spacing: -0.5px;
        }
        .brand-title .accent {
            background: linear-gradient(135deg, #00c853, #00e676);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-sep {
            width: 1px;
            height: 15mm;
            background: rgba(255,255,255,0.15);
            flex-shrink: 0;
        }

        .brand-sub {
            font-size: 10pt;
            color: #cbd5e1;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin: 0;
        }

        /* ── FILA 2: campos ── */
        .row-fields {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12mm;
            padding: 4mm 0;
        }

        .field { width: 100%; }

        .field-label {
            display: block;
            font-size: 12pt;
            font-weight: 800;
            color: #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 3mm;
            line-height: 1;
        }

        .field-box {
            width: 100%;
            height: 22mm;
            border-radius: 8px;
            background: #ffffff;
            text-align: center;
            line-height: 22mm;
            font-size: 28pt;
            font-weight: 800;
            color: #1e293b;
            letter-spacing: -0.3px;
            overflow: hidden;
            white-space: nowrap;
            cursor: text;
            outline: none;
        }
        .field-box:focus { outline: 3px solid rgba(99,102,241,0.45); outline-offset: 2px; }
        .field-box:empty::before {
            content: attr(data-placeholder);
            color: #94a3b8;
            font-size: 10pt;
            font-weight: 400;
            letter-spacing: 0;
        }
        .field:nth-child(1) .field-box { border-left: 5px solid #6366f1; }
        .field:nth-child(2) .field-box { border-left: 5px solid #00c853; }

        /* ── Control de tamaño por campo ── */
        .campo-size-ctrl {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            margin-left: auto;
            cursor: pointer;
        }
        .campo-size-ctrl input[type="range"] {
            width: 55px;
            accent-color: #6366f1;
            cursor: pointer;
        }
        .campo-size-ctrl .size-val {
            font-size: 6.5pt;
            font-weight: 700;
            color: #6366f1;
            min-width: 26px;
            text-align: right;
        }
        @media print { .campo-size-ctrl { display: none !important; } }

        /* ── FILA 3: footer 9mm fijo ── */
        .row-footer {
            position: relative;
            z-index: 2;
            height: 9mm;
            flex-shrink: 0;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        /* izquierda: android + descárgalo */
        .footer-left {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 1.5mm;
            flex-shrink: 0;
        }
        .footer-left svg { display: block; flex-shrink: 0; }
        .footer-descarga {
            font-size: 8.5pt;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin: 0;
            white-space: nowrap;
        }

        /* derecha: texto + botón */
        .footer-right {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 3mm;
            flex-shrink: 0;
        }

        .footer-text {
            font-size: 8.5pt;
            color: #94a3b8;
            margin: 0;
            white-space: nowrap;
        }
        .footer-text strong { color: #fff; }

        .footer-btn {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 1.5mm;
            font-size: 8.5pt;
            font-weight: 700;
            color: #22c55e;
            background: transparent;
            border: 1.5px solid rgba(34,197,94,0.6);
            padding: 1mm 4mm;
            border-radius: 50px;
            line-height: 1.2;
        }
        .footer-btn span { text-align: center; }

        /* ── Badge "de Mercado Pago" junto al label alias ── */
        .field-label-row {
            display: flex;
            align-items: center;
            gap: 3mm;
            margin-bottom: 3mm;
        }
        .field-label-row .field-label {
            margin-bottom: 0;
        }
        .mp-badge {
            display: inline-flex;
            align-items: center;
            gap: 1.2mm;
            font-size: 6.5pt;
            font-weight: 700;
            color: #009ee3;
            letter-spacing: 0.4px;
            text-transform: none;
            border: 1px solid rgba(0,158,227,0.4);
            border-radius: 50px;
            padding: 0.8mm 2.5mm;
            background: rgba(0,158,227,0.08);
            white-space: nowrap;
            line-height: 1;
        }

        /* ── Centro footer: Requiere Mercado Pago ── */
        .footer-center {
            display: flex;
            align-items: center;
            gap: 1.5mm;
            flex-shrink: 0;
        }
        .footer-mp-req {
            font-size: 8.5pt;
            font-weight: 700;
            color: #009ee3;
            white-space: nowrap;
            margin: 0;
        }

        .nav-btns {
            position: fixed;
            top: 16px;
            right: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
        }

        @media print { .nav-btns { display: none !important; } }

        .nav-btns a, .nav-btns button {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(99,102,241,0.4);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .nav-btns a {
            background: rgba(255,255,255,0.12);
            box-shadow: none;
        }

        .size-control {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            padding: 8px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            color: #cbd5e1;
        }
        .size-control input[type="range"] {
            width: 75px;
            cursor: pointer;
            accent-color: #6366f1;
        }
        .size-control .size-val {
            min-width: 30px;
            text-align: center;
            color: #a5b4fc;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="nav-btns">
    <a href="vertical.html">↕️ Ver Vertical</a>
    <button onclick="imprimirA5()">🖨️ Imprimir A5</button>
    <button onclick="imprimirA4()">🖨️ Imprimir A4</button>
</div>

<div class="cartel">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="corner c-tl"></div>
    <div class="corner c-tr"></div>
    <div class="corner c-bl"></div>
    <div class="corner c-br"></div>

    <div class="row-brand">
        <div class="logo-wrap">
            <img src="cajvoz_logo.png" alt="CajaVoz logo">
        </div>
        <h1 class="brand-title">Caja<span class="accent">Voz</span></h1>
        <div class="brand-sep"></div>
        <p class="brand-sub">Tus cobros digitales ahora tienen voz</p>
    </div>

    <div class="row-fields">
        <div class="field">
            <div class="field-label-row">
                <span class="field-label">Alias de Cobro</span>
                <span class="mp-badge">
                    <img src="https://cdn.simpleicons.org/mercadopago/009ee3" width="10" height="10" alt="MP" style="display:block;flex-shrink:0;">
                    de Mercado Pago
                </span>
                <label class="campo-size-ctrl">
                    <input type="range" min="10" max="60" value="28" step="1" oninput="cambiarTamano(this, 1)">
                    <span class="size-val" id="size-1">28pt</span>
                </label>
            </div>
            <div class="field-box" contenteditable="true" spellcheck="false" data-placeholder="Escribí el alias aquí…"></div>
        </div>
        <div class="field">
            <div class="field-label-row">
                <span class="field-label">Titular de la Cuenta</span>
                <label class="campo-size-ctrl">
                    <input type="range" min="10" max="60" value="28" step="1" oninput="cambiarTamano(this, 2)">
                    <span class="size-val" id="size-2">28pt</span>
                </label>
            </div>
            <div class="field-box" contenteditable="true" spellcheck="false" data-placeholder="Escribí el titular aquí…"></div>
        </div>
    </div>

    <div class="row-footer">
        <!-- izquierda: Android robot + disponible para Android -->
        <div class="footer-left">
            <!-- Android logo oficial vía SimpleIcons/CDN -->
            <img src="https://cdn.simpleicons.org/android/3DDC84" width="14" height="14" alt="Android" style="display:block;flex-shrink:0;">
            <span class="footer-descarga">Disponible para Android</span>
        </div>
        <!-- centro: Requiere Mercado Pago -->
        <div class="footer-center">
            <img src="https://cdn.simpleicons.org/mercadopago/009ee3" width="14" height="14" alt="Mercado Pago" style="display:block;flex-shrink:0;">
            <span class="footer-mp-req">Requiere Mercado Pago</span>
        </div>
        <!-- derecha: texto + botón WhatsApp -->
        <div class="footer-right">
            <p class="footer-text">Sumá <strong>CajaVoz</strong> a tu negocio</p>
            <div class="footer-btn">
                <!-- WhatsApp icon -->
                <svg width="10" height="10" viewBox="0 0 24 24" fill="#fff" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
                </svg>
                <span>Contactanos<br>1141641071</span>
            </div>
        </div>
    </div>
</div>

<script>
    function cambiarTamano(input, fieldNum) {
        const box = document.querySelector(`.field:nth-child(${fieldNum}) .field-box`);
        box.style.fontSize = input.value + 'pt';
        box.style.lineHeight = '22mm';
        document.getElementById('size-' + fieldNum).textContent = input.value + 'pt';
    }

    function imprimirA5() {
        const ov = document.getElementById('print-override');
        if (ov) ov.remove();
        window.print();
    }

    function imprimirA4() {
        let s = document.getElementById('print-override');
        if (!s) { s = document.createElement('style'); s.id = 'print-override'; document.head.appendChild(s); }
        s.textContent = '@media print { @page { size: A4 landscape; margin: 0; } .cartel { width: 297mm; height: 210mm; } }';
        window.print();
        s.remove();
    }

    // Bloquear Enter y limpiar pegado en campos editables
    document.querySelectorAll('.field-box[contenteditable]').forEach(el => {
        el.addEventListener('keydown', e => { if (e.key === 'Enter') e.preventDefault(); });
        el.addEventListener('paste', e => {
            e.preventDefault();
            const txt = (e.clipboardData || window.clipboardData).getData('text/plain');
            document.execCommand('insertText', false, txt.replace(/\n/g, ' '));
        });
    });
</script>
</body>
</html>
